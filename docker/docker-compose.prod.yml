# Produção — SSL, limites de recursos, sem portas diretas (só nginx)

services:
  mysql:
    env_file: .env.production
    deploy:
      resources:
        limits:
          memory: 512M

  api:
    env_file: .env.production
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5070
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5070/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  webapp:
    env_file: .env.production
    environment:
      - NODE_ENV=production
      - API_URL=http://sgc-api:5070/api/v1
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ssl:/etc/nginx/ssl:ro
      - ./letsencrypt:/etc/letsencrypt
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1 > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
